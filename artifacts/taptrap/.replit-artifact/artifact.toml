kind = "web"
previewPath = "/"
title = "TapTrap"
version = "1.0.0"
id = "artifacts/taptrap"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25408

[services.development]
run = "pnpm --filter @workspace/taptrap run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/taptrap", "run", "build" ]
publicDir = "artifacts/taptrap/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25408"
BASE_PATH = "/"
